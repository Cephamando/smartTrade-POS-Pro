services:
  web:
    container_name: pos_app
    build: 
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "${APP_PORT:-8090}:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASS}
    depends_on:
      db:
        condition: service_healthy   # ✅ Wait for MySQL to be READY, not just started
    networks:
      - pos-net

  db:
    container_name: pos_db
    image: mysql:8.3
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_HOST: "%"
      TZ: ${TZ}
    ports:
      - "${DB_PORT_EXTERNAL:-8091}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:                                          # ✅ Added healthcheck
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Give MySQL time to initialize on first run
    networks:
      - pos-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pos_pma
    ports:
      - "${PHPMYADMIN_PORT:-8092}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy   # ✅ Same fix
    networks:
      - pos-net

  adminer:
    image: adminer
    container_name: pos_adminer
    ports:
      - "${ADMINER_PORT:-8093}:8080"
    depends_on:
      db:
        condition: service_healthy   # ✅ Same fix
    networks:
      - pos-net

volumes:
  db_data:

networks:
  pos-net:
    driver: bridge